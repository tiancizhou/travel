                    },
                    () => reject(new Error('navigator geolocation failed')),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 },
                );
            });
        }

        throw new Error('no browser geolocation available');
    }

    async function locateByIpFallback() {
        const resp = await fetch('/api/location');
        const data = await resp.json();
        return {
            lng: Number(data.lng),
            lat: Number(data.lat),
            city: data.city || '',
            name: data.city ? `${data.city} · 估算位置` : '估算位置',
            source: 'ip',
        };
    }

    function updateLocationStatus(location) {
        const status = document.getElementById('locationStatus');
        if (location.source === 'browser') {
            status.classList.remove('muted');
            status.innerHTML = `定位来源：<strong>浏览器高精度定位</strong><br>${escapeHtml(location.name || location.city || '已获取当前位置')}`;
            return;
        }

        if (location.source === 'ip') {
            status.classList.add('muted');
            status.innerHTML = `定位来源：<strong>IP 估算</strong><br>${escapeHtml(location.name || location.city || '估算位置，可能不准确')}`;
            return;
        }

        status.classList.add('muted');
        status.textContent = location.name || '定位失败，当前为默认地图中心';
    }

    async function onMapClick(e) {
        const lng = Number(e.lnglat.getLng().toFixed(6));
        const lat = Number(e.lnglat.getLat().toFixed(6));

        if (!startCoord) {
            await setPoint('start', { lng, lat });
            return;
        }
        if (!endCoord) {
            await setPoint('end', { lng, lat });
            return;
        }
        await addWaypoint({ lng, lat });
    }

    async function setPoint(kind, point) {
        const name = point.name || await reverseGeocode(point.lng, point.lat);
        const marker = new AMap.Marker({
            position: [point.lng, point.lat],
            label: { content: kind === 'start' ? '起' : '终', direction: 'top' },
            map,
        });

        if (kind === 'start') {
            if (startMarker) startMarker.setMap(null);
            startMarker = marker;
            startCoord = { lng: point.lng, lat: point.lat, name };
            bindMarkerAnalysis(startMarker, startCoord, '起点');
        } else {
            if (endMarker) endMarker.setMap(null);
            endMarker = marker;
            endCoord = { lng: point.lng, lat: point.lat, name };
            bindMarkerAnalysis(endMarker, endCoord, '终点');
        }

        searchState[kind].selectedName = name;
        updatePointUI(kind);
        hidePanel(kind);
        updatePlanButton();
        triggerRouteRefresh();
    }

    function updatePointUI(kind) {
        const point = kind === 'start' ? startCoord : endCoord;
        const input = document.getElementById(`${kind}-input`);
        const hint = document.getElementById(`${kind}-hint`);
        const card = document.getElementById(`card-${kind}`);

        if (!point) {
            input.value = '';
            hint.textContent = kind === 'start' ? '尚未设置起点' : '尚未设置终点';
            card.classList.remove('has-value');
            return;
        }

        input.value = point.name || `${point.lng}, ${point.lat}`;
        hint.textContent = `${point.lng.toFixed(6)}, ${point.lat.toFixed(6)}`;
        card.classList.add('has-value');
    }

    function clearPoint(kind) {
        if (kind === 'start') {
            if (startMarker) startMarker.setMap(null);
            startMarker = null;
            startCoord = null;
            clearWaypoints();
        } else {
            if (endMarker) endMarker.setMap(null);
            endMarker = null;
            endCoord = null;
            clearWaypoints();
        }
        searchState[kind].selectedName = '';
        hidePanel(kind);
        updatePointUI(kind);
        updatePlanButton();
        renderWaypointList();
        triggerRouteRefresh();
    }

    function updatePlanButton() {
        const resultArea = document.getElementById('resultArea');
        if (startCoord && endCoord) {
            resultArea.innerHTML = '<div class="empty-state"><div class="icon">🧭</div><p>路线将根据点位变化自动刷新。</p></div>';
            return;
        }
        resultArea.innerHTML = '<div class="empty-state"><div class="icon">🗺️</div><p>请先设置起点和终点；之后途经点变化会自动刷新路线图。</p></div>';
    }

    async function addWaypoint(point) {
        const name = point.name || await reverseGeocode(point.lng, point.lat);
        const index = waypointCoords.length + 1;
        const marker = new AMap.Marker({
            position: [point.lng, point.lat],
            label: { content: `${index}`, direction: 'top' },
            map,
        });
        const waypoint = { lng: point.lng, lat: point.lat, name };
        waypointCoords.push(waypoint);
        waypointMarkers.push(marker);
        bindMarkerAnalysis(marker, waypoint, `途经点${index}`);
        renderWaypointList();
        triggerRouteRefresh();
    }

    function clearWaypoints() {
        waypointMarkers.forEach((marker) => marker.setMap(null));
        waypointMarkers = [];
        waypointCoords = [];
        renderWaypointList();
        triggerRouteRefresh();
    }

    function removeWaypoint(index) {
        const marker = waypointMarkers[index];
        if (marker) marker.setMap(null);
        waypointMarkers.splice(index, 1);
        waypointCoords.splice(index, 1);
        waypointMarkers.forEach((marker, idx) => {
            marker.setLabel({ content: `${idx + 1}`, direction: 'top' });
        });
        renderWaypointList();
        triggerRouteRefresh();
    }

    function renderWaypointList() {
        const container = document.getElementById('waypointList');
        if (!waypointCoords.length) {
            container.innerHTML = '<div class="waypoint-meta">第三次点击地图后，会按顺序加入途经点。</div>';
            return;
        }
        container.innerHTML = waypointCoords.map((point, index) => `
            <div class="waypoint-item">
                <div class="waypoint-badge">${index + 1}</div>
                <div class="waypoint-info">
                    <div class="waypoint-name">${escapeHtml(point.name || '未命名途经点')}</div>
                    <div class="waypoint-meta">${point.lng.toFixed(6)}, ${point.lat.toFixed(6)}</div>
                </div>
                <button class="waypoint-remove" data-waypoint-index="${index}" type="button">×</button>
            </div>
        `).join('');
        container.querySelectorAll('[data-waypoint-index]').forEach((button) => {
            button.addEventListener('click', () => removeWaypoint(Number(button.dataset.waypointIndex)));
        });
    }

    function bindMarkerAnalysis(marker, point, label) {
        marker.on('mouseover', () => {
            if (hoverPreviewTimer) {
                clearTimeout(hoverPreviewTimer);
            }
            hoverPreviewTimer = setTimeout(() => {
                if (!infoWindow) {
                    infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -24) });
                }
                infoWindow.setContent(renderMarkerPreview(point, label));
                infoWindow.open(map, [point.lng, point.lat]);
            }, 180);
        });
        marker.on('mouseout', () => {
            if (hoverPreviewTimer) {
                clearTimeout(hoverPreviewTimer);
                hoverPreviewTimer = null;
            }
        });
        marker.on('click', async () => {
            if (hoverPreviewTimer) {
                clearTimeout(hoverPreviewTimer);
                hoverPreviewTimer = null;
            }
            await analyzePoint(point, label);
        });
    }

    async function analyzePoint(point, label) {
        const cacheKey = getPointCacheKey(point);
        if (pointAnalysisCache[cacheKey]) {
            if (!infoWindow) {
                infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -24) });
            }
            infoWindow.setContent(renderMarkerAnalysis(pointAnalysisCache[cacheKey], cacheKey));
            infoWindow.open(map, [point.lng, point.lat]);
            bindInfoWindowActions(cacheKey);
            return;
        }

        if (!infoWindow) {
            infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -24) });
        }
        infoWindow.setContent('<div class="marker-preview"><div class="marker-preview-title">正在分析</div><div class="marker-loading"><div class="marker-loading-spinner"></div><span class="marker-loading-text marker-loading-dots">AI 分析中，请稍候</span></div></div>');
        infoWindow.open(map, [point.lng, point.lat]);
        try {
            const resp = await fetch('/api/analyze-point', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lng: point.lng, lat: point.lat, label }),
            });
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.detail || '点位分析失败');
            }
            const data = await resp.json();
            const payload = {
                ...data,
                label: label || data.name || '点位分析',
            };
            pointAnalysisCache[cacheKey] = payload;
            if (startCoord && point.lng === startCoord.lng && point.lat === startCoord.lat && startMarker) {
                markMarkerAnalyzed(startMarker);
            }
            if (endCoord && point.lng === endCoord.lng && point.lat === endCoord.lat && endMarker) {
                markMarkerAnalyzed(endMarker);
            }
            waypointCoords.forEach((waypoint, index) => {
                if (point.lng === waypoint.lng && point.lat === waypoint.lat && waypointMarkers[index]) {
                    markMarkerAnalyzed(waypointMarkers[index]);
                }
            });
            infoWindow.setContent(renderMarkerAnalysis(payload, cacheKey));
            infoWindow.open(map, [point.lng, point.lat]);
            bindInfoWindowActions(cacheKey);
        } catch (err) {
            infoWindow.setContent(`
                <div class="marker-analysis">
                    <div class="marker-analysis-title">点位分析失败</div>
                    <p>${escapeHtml(err.message || '请求失败')}</p>
                    <div class="marker-action-row">
                        <button class="marker-retry-btn" type="button">重新生成</button>
                    </div>
                </div>
            `);
            infoWindow.open(map, [point.lng, point.lat]);
            bindInfoWindowRetry(point, label);
        }
    }

    async function reverseGeocode(lng, lat) {
        try {
            const geocoder = new AMap.Geocoder();
            return await new Promise((resolve) => {
                geocoder.getAddress([lng, lat], (status, result) => {
                    if (status === 'complete' && result.regeocode) {
                        resolve(result.regeocode.formattedAddress || `${lng}, ${lat}`);
                        return;
                    }
                    resolve(`${lng}, ${lat}`);
                });
            });
        } catch (err) {
            return `${lng}, ${lat}`;
        }
    }

    function handleSearchInput(kind) {
        const input = document.getElementById(`${kind}-input`);
        const keyword = input.value.trim();
        searchState[kind].selectedName = '';
        clearTimeout(searchState[kind].timer);

        if (keyword.length < 2) {
            hidePanel(kind);
            return;
        }

        searchState[kind].timer = setTimeout(() => {
            fetchSearchResults(kind, keyword);
        }, 220);
    }

    async function fetchSearchResults(kind, keyword) {
        const requestId = ++searchState[kind].requestId;
        try {
            const resp = await fetch(`/api/search?keywords=${encodeURIComponent(keyword)}`);
            const list = await resp.json();
            if (requestId !== searchState[kind].requestId) return;
            if (!Array.isArray(list) || list.length === 0) {
                renderSearchResults(kind, []);
                return;
            }
            renderSearchResults(kind, list.filter(item => item.location));
        } catch (err) {
            hidePanel(kind);
        }
    }

    function renderSearchResults(kind, list) {
        const panel = document.getElementById(`${kind}-panel`);
        if (!list.length) {
            panel.innerHTML = '<div class="ac-item"><span class="ac-name">未找到相关地点</span></div>';
            panel.classList.add('show');
            return;
        }

        panel.innerHTML = list.slice(0, 6).map((item, index) => {
            const title = escapeHtml(item.name || '未知地点');
            const district = escapeHtml([item.address, item.type].filter(Boolean).join(' · '));
            return `
                <div class="ac-item" data-kind="${kind}" data-index="${index}">
                    <div>
                        <div class="ac-name">${title}</div>
                        <div class="ac-district">${district || '暂无详细地址'}</div>
                    </div>
                </div>
            `;
        }).join('');

        panel.classList.add('show');
        panel.querySelectorAll('.ac-item').forEach((node, index) => {
            node.addEventListener('click', async () => {
                const item = list[index];
                if (!item.location) return;
                const [lng, lat] = item.location.split(',').map(Number);
                await setPoint(kind, {
                    lng,
                    lat,
                    name: [item.name, item.address].filter(Boolean).join(' · '),
                });
                map.setCenter([lng, lat]);
            });
        });
    }

    function hidePanel(kind) {
        const panel = document.getElementById(`${kind}-panel`);
        panel.classList.remove('show');
        panel.innerHTML = '';
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    let routeRefreshTimer = null;

    function triggerRouteRefresh() {
        if (routeRefreshTimer) {
            clearTimeout(routeRefreshTimer);
        }
        routeRefreshTimer = setTimeout(() => {
            refreshRoute();
        }, 220);
    }

    // ── 路线卡折叠状态（模块级，路线刷新不重置）──
    let routeCardCollapsed = false;

    function toggleRouteCard() {
        routeCardCollapsed = !routeCardCollapsed;
        const card = document.getElementById('routeFloatingCard');
        const btn  = document.getElementById('routeCardToggle');
        card.classList.toggle('collapsed', routeCardCollapsed);
        btn.setAttribute('aria-expanded', routeCardCollapsed ? 'false' : 'true');
        btn.setAttribute('aria-label', routeCardCollapsed ? '展开路线卡' : '折叠路线卡');
    }

    async function refreshRoute() {
        const routeCard = document.getElementById('routeFloatingCard');
        if (!startCoord || !endCoord) {
            clearRouteLine();
            routeCard.classList.remove('show');
            return;
        }

        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>路线规划中，请稍候...</p></div>';

        try {
            const resp = await fetch('/api/plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    start_lng: startCoord.lng,
                    start_lat: startCoord.lat,
                    end_lng: endCoord.lng,
                    end_lat: endCoord.lat,
                    mode: currentMode,
                    waypoints: waypointCoords.map((point) => ({ lng: point.lng, lat: point.lat, label: point.name || '' })),
                }),
            });

            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.detail || '请求失败');
            }

            const data = await resp.json();

            if (routeLine) routeLine.setMap(null);
            const path = data.route.map(p => new AMap.LngLat(p[0], p[1]));
            routeLine = new AMap.Polyline({
                path: path,
                strokeColor: '#c45d3e',
                strokeWeight: 4,
                strokeOpacity: 0.85,
                lineJoin: 'round',
                lineCap: 'round',
                showDir: true,
                map: map,
            });
            map.setFitView([routeLine], false, [80, 80, 80, 80]);

            const distKm = (data.distance / 1000).toFixed(1);
            const durMin = Math.ceil(data.duration / 60);
            const modeHtml = `<div class="mode-badge">${renderModeLabel(data.mode || currentMode)}</div>`;
            const transitSummaryHtml = data.transit_summary
                ? `<div class="transit-summary">换乘摘要：${escapeHtml(data.transit_summary)}</div>`
                : '';
            const transitStepsHtml = renderTransitSteps(data.transit_steps);

            // 更新折叠态摘要行（header 内，折叠时可见）
            const summaryEl = document.getElementById('routeCardSummary');
            if (summaryEl) {
                summaryEl.innerHTML =
                    `${modeHtml}<span class="stat-chip-sm">${distKm} km</span><span class="stat-chip-sm">${durMin} min</span>`;
            }

            // 更新展开态主体（不覆盖 header 和 drag-handle）
            const bodyEl = document.getElementById('routeCardBody');
            if (bodyEl) {
                bodyEl.innerHTML = `
                    <div class="animate-in">
                        ${transitSummaryHtml}
                        ${transitStepsHtml}
                        <div class="route-stats">
                            <div class="stat-chip">
                                <div class="num">${distKm}</div>
                                <div class="unit">公里</div>
                            </div>
                            <div class="stat-chip">
                                <div class="num">${durMin}</div>
                                <div class="unit">分钟</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            // 不重置 .collapsed class，保持用户折叠偏好
            routeCard.classList.add('show');
            resultArea.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>路线图已自动刷新。点击地图上的任意点位标记，可单独触发 AI 景点分析。</p></div>';

            showToast('路线图生成成功');
        } catch (err) {
            const msg = String(err.message || '请求失败');
            let hint = '';
            if (msg.includes('超出高德') || msg.includes('距离过长')) {
                hint = '<br>建议切换到公交地铁模式，或缩短起终点距离后再试。';
            } else if (msg.includes('限流') || msg.includes('请求过于频繁')) {
                hint = '<br>请稍等几秒后重试，或减少途经点数量。';
            }
            resultArea.innerHTML = `<div class="error-banner">生成失败：${err.message}${hint}</div>`;
            routeCard.classList.remove('show');
            showToast('生成失败，请重试');
        }
    }

    function renderWeather(weather) {
        if (!weather) return '';
        return `
            <div class="weather-card">
                <div class="weather-main">
                    <div class="weather-city">${weather.city || weather.province || '当前天气'}</div>
                    <div class="weather-status">${weather.weather || '天气未知'}</div>
                    <div class="weather-meta">${weather.winddirection || ''}风 ${weather.windpower || ''}级 · 湿度 ${weather.humidity || '--'}%</div>
                </div>
                <div class="weather-temp">${weather.temperature || '--'}°</div>
            </div>
        `;
    }

    function renderModeLabel(mode) {
        if (mode === 'transit') return '当前路线：公交地铁';
        return '当前路线：步行';
    }

    function renderTransitSteps(steps) {
        if (!Array.isArray(steps) || !steps.length) return '';
        const items = steps.map((step) => `<li>${escapeHtml(step)}</li>`).join('');
        return `
            <div class="transit-steps">
                <h4>交通路线</h4>
                <ol>${items}</ol>
            </div>
        `;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    initMap();
</script>
</body>
